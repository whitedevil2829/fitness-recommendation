spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  mongodb:
    database: fitnessActivity
    uri: mongodb://localhost:27017/fitnessActivity

server:
  port: 8082


eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking